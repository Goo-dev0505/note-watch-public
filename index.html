<style>
  :root {
    --bg:      #0c0c0f;
    --surface: #141418;
    --border:  rgba(255,255,255,.07);
    --text:    #f0f0f5;
    --sub:     #6b6b80;
    --accent:  #ffd166;
    --pill-bg: rgba(255,255,255,.08);
    --pill-on: #ffd166;
    --pill-tx: #0c0c0f;
    --overlay: linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.4) 55%, transparent 100%);
    --radius:  14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif;
    min-height: 100svh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .hdr {
    padding: 1.1rem 1.1rem .6rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .hdr-title {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -.03em;
    color: var(--text);
  }
  .hdr-title em {
    color: var(--accent);
    font-style: normal;
  }
  .hdr-meta {
    font-size: .7rem;
    color: var(--sub);
    text-align: right;
    line-height: 1.5;
  }
  .hdr-meta strong { color: var(--accent); }

  /* ── Creator Tabs ── */
  .tabs-wrap {
    padding: .4rem 1.1rem .6rem;
    display: flex;
    gap: .45rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    background: var(--pill-bg);
    border: 1px solid var(--border);
    color: var(--sub);
    border-radius: 999px;
    padding: .35rem 1rem;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .18s, color .18s, border-color .18s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: var(--pill-on);
    border-color: var(--pill-on);
    color: var(--pill-tx);
  }

  /* ── Search ── */
  .search-wrap {
    padding: 0 1.1rem .75rem;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 1.7rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--sub);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: .65rem .9rem .65rem 2.4rem;
    font-size: .9rem;
    outline: none;
    transition: border-color .18s;
    -webkit-appearance: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--sub); }

  /* ── Count bar ── */
  .countbar {
    padding: 0 1.1rem .55rem;
    font-size: .72rem;
    color: var(--sub);
  }
  .countbar strong { color: var(--text); }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .55rem;
    padding: 0 .75rem 2rem;
  }

  /* featured: 最新1件は横幅フル */
  .card.featured {
    grid-column: 1 / -1;
  }

  .card {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    -webkit-tap-highlight-color: transparent;
    transition: transform .18s, box-shadow .18s;
    will-change: transform;
  }
  .card:active { transform: scale(.97); }

  /* サムネ */
  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    transition: transform .3s;
  }
  .card.featured .card-img { aspect-ratio: 16/7; }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #1a1a22, #22222e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }
  .card.featured .card-img-placeholder { aspect-ratio: 16/7; }

  /* オーバーレイテキスト */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: .65rem .7rem;
    gap: .3rem;
  }
  .card.featured .card-overlay { padding: 1rem 1.1rem; }

  .card-badge {
    font-size: .62rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: .06em;
    text-transform: uppercase;
    opacity: .9;
  }
  .card-title {
    font-size: .78rem;
    font-weight: 700;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
  .card.featured .card-title {
    font-size: 1rem;
    -webkit-line-clamp: 2;
  }
  .card-date {
    font-size: .62rem;
    color: rgba(255,255,255,.5);
    margin-top: .1rem;
  }

  /* ── Empty ── */
  .empty {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--sub);
  }
  .empty-icon { font-size: 3rem; margin-bottom: .75rem; }

  /* ── Safe area ── */
  .safe-bottom { height: env(safe-area-inset-bottom, 0px); }

  /* ── PC補正（600px以上） ── */
  @media (min-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); padding: 0 1rem 2rem; }
    .card.featured { grid-column: 1 / -1; }
    .card.featured .card-img { aspect-ratio: 21/7; }
    .card.featured .card-img-placeholder { aspect-ratio: 21/7; }
    .card-title { font-size: .82rem; }
    .card.featured .card-title { font-size: 1.15rem; }
    .hdr { padding: 1.4rem 1.4rem .8rem; }
    .tabs-wrap, .search-wrap, .countbar { padding-left: 1.4rem; padding-right: 1.4rem; }
  }
</style>

let creator = 'all';

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    creator = t.dataset.creator;
    render();
  });
});

function filtered() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  return DATA.filter(a => {
    if (creator !== 'all' && a.target_name !== creator) return false;
    if (q && !a.title.toLowerCase().includes(q) && !a.target_name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const items = filtered();
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('disp-count').textContent = items.length;
  document.getElementById('count-label').textContent = items.length;

  if (!items.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map((a, i) => {
    const featured = i === 0 ? 'featured' : '';
    const img = a.thumbnail_url
      ? `<img class="card-img" src="${a.thumbnail_url}" alt="" loading="${i < 4 ? 'eager' : 'lazy'}">`
      : `<div class="card-img-placeholder">📝</div>`;
    return `
      <a class="card ${featured}" href="${a.note_url}" target="_blank" rel="noopener">
        ${img}
        <div class="card-overlay">
          <span class="card-badge">${a.target_name}</span>
          <p class="card-title">${a.title}</p>
          <span class="card-date">${a.published_at}</span>
        </div>
      </a>`;
  }).join('');
}

render();
</script>
