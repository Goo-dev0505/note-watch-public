<style>
  /* ===== Base ===== */
  :root {
    --bg:       #0a0e1a;
    --surface:  #111827;
    --surface2: #1a2235;
    --border:   #1e293b;
    --text:     #e2e8f0;
    --sub:      #64748b;
    --accent:   #00d4ff;
    --accent2:  #f78166;
    --badge-bg: #0e3460;
    --badge-tx: #60a5fa;
    --green:    #34d399;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ===== Header ===== */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .meta { font-size: .72rem; color: var(--sub); margin-left: auto; }
  .meta span { color: var(--accent2); font-weight: 600; }

  /* ===== Toolbar ===== */
  .toolbar {
    padding: .75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: .75rem;
    align-items: center;
    flex-wrap: wrap;
    background: var(--surface);
    position: sticky;
    top: 53px;
    z-index: 99;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: .6rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--sub);
    pointer-events: none;
  }
  .toolbar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: .4rem .75rem .4rem 2rem;
    font-size: .85rem;
    outline: none;
    transition: border-color .15s;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .count { font-size: .8rem; color: var(--sub); white-space: nowrap; }
  .count span { color: var(--text); font-weight: 600; }

  /* ===== View Toggle ===== */
  .view-toggle {
    display: flex;
    gap: .25rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
  }
  .view-btn {
    background: none;
    border: none;
    color: var(--sub);
    cursor: pointer;
    padding: .3rem .5rem;
    border-radius: 4px;
    transition: all .15s;
    display: flex;
    align-items: center;
  }
  .view-btn.active {
    background: var(--accent);
    color: #000;
  }

  /* ===== Creator Tabs ===== */
  .creator-bar {
    padding: .5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: .5rem;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
  }
  .creator-bar::-webkit-scrollbar { display: none; }
  .tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--sub);
    border-radius: 20px;
    padding: .25rem .9rem;
    font-size: .78rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* ===== Card View ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: .875rem;
    padding: 1.25rem 1.5rem;
  }
  .card {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s, transform .1s, box-shadow .15s;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 24px rgba(0, 212, 255, .1);
  }
  .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--surface2); }
  .card-body {
    padding: .75rem;
    display: flex;
    flex-direction: column;
    gap: .35rem;
    flex: 1;
  }
  .badge {
    font-size: .68rem;
    color: var(--badge-tx);
    background: var(--badge-bg);
    border-radius: 4px;
    padding: .1rem .4rem;
    align-self: flex-start;
    font-weight: 600;
  }
  .card-title { font-size: .85rem; font-weight: 600; line-height: 1.45; }
  .card-date { font-size: .7rem; color: var(--sub); margin-top: auto; padding-top: .35rem; }

  /* ===== List View ===== */
  .list-view {
    padding: .75rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .375rem;
  }
  .list-item {
    display: flex;
    align-items: center;
    gap: .875rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .625rem .875rem;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s, background .15s;
  }
  .list-item:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .list-thumb {
    width: 72px;
    height: 40px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .list-thumb-placeholder {
    width: 72px;
    height: 40px;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .list-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: .2rem;
  }
  .list-title {
    font-size: .85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-meta {
    display: flex;
    gap: .5rem;
    align-items: center;
    font-size: .7rem;
    color: var(--sub);
  }
  .list-arrow {
    color: var(--sub);
    flex-shrink: 0;
    transition: color .15s, transform .15s;
  }
  .list-item:hover .list-arrow {
    color: var(--accent);
    transform: translateX(2px);
  }

  /* ===== Empty ===== */
  .empty {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--sub);
    font-size: .9rem;
    display: none;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }

  /* ===== Footer ===== */
  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    text-align: center;
    font-size: .7rem;
    color: var(--sub);
  }
</style>

let currentView    = 'card';
let currentCreator = 'all';

// クリエイタータブ
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCreator = tab.dataset.creator;
    render();
  });
});

function setView(v) {
  currentView = v;
  document.getElementById('btn-card').classList.toggle('active', v === 'card');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  render();
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return ARTICLES.filter(a => {
    const matchCreator = currentCreator === 'all' || a.target_name === currentCreator;
    const matchSearch  = !q || a.title.toLowerCase().includes(q) || a.target_name.toLowerCase().includes(q);
    return matchCreator && matchSearch;
  });
}

function render() {
  const items   = filtered();
  const content = document.getElementById('content');
  const empty   = document.getElementById('empty');
  document.getElementById('count').textContent = items.length;

  if (!items.length) {
    content.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  if (currentView === 'card') {
    const cards = items.map(a => {
      const thumb = a.thumbnail_url
        ? `<img class="thumb" src="${a.thumbnail_url}" alt="" loading="lazy">`
        : `<div class="thumb-placeholder"></div>`;
      return `
        <a class="card" href="${a.note_url}" target="_blank" rel="noopener">
          ${thumb}
          <div class="card-body">
            <span class="badge">${a.target_name}</span>
            <p class="card-title">${a.title}</p>
            <span class="card-date">${a.published_at}</span>
          </div>
        </a>`;
    }).join('');
    content.innerHTML = `<div class="grid">${cards}</div>`;
  } else {
    const rows = items.map(a => {
      const thumb = a.thumbnail_url
        ? `<img class="list-thumb" src="${a.thumbnail_url}" alt="" loading="lazy">`
        : `<div class="list-thumb-placeholder"></div>`;
      return `
        <a class="list-item" href="${a.note_url}" target="_blank" rel="noopener">
          ${thumb}
          <div class="list-body">
            <div class="list-title">${a.title}</div>
            <div class="list-meta">
              <span class="badge">${a.target_name}</span>
              <span>${a.published_at}</span>
            </div>
          </div>
          <svg class="list-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>`;
    }).join('');
    content.innerHTML = `<div class="list-view">${rows}</div>`;
  }
}

render();
</script>
