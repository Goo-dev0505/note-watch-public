<style>
  :root {
    --bg:       #0a0a0c;
    --surface:  #111114;
    --surface2: #18181c;
    --border:   rgba(255,255,255,.08);
    --text:     #f5f5f7;
    --sub:      #5a5a6e;
    --sub2:     #3a3a4e;
    --blue:     #4A66AC;
    --blue-l:   #A9B7D7;
    --blue-ll:  #D0D7E9;
    --overlay:  linear-gradient(to top, rgba(0,0,0,.92) 0%, rgba(0,0,0,.5) 50%, transparent 100%);
    --r:        10px;
    --font-en:  'Inter', sans-serif;
    --font-jp:  'Noto Sans JP', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-jp);
    min-height: 100svh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .hdr {
    padding: 1.4rem 1.2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: .5rem;
  }
  .hdr-nav {
    font-family: var(--font-en);
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: .45rem;
  }
  .hdr-title {
    font-family: var(--font-jp);
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.1;
    color: var(--text);
  }
  .hdr-right {
    text-align: right;
  }
  .hdr-count {
    font-family: var(--font-en);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.04em;
    line-height: 1;
  }
  .hdr-count-label {
    font-size: .62rem;
    color: var(--sub);
    letter-spacing: .06em;
    margin-top: .2rem;
    font-family: var(--font-en);
  }
  .hdr-date {
    font-size: .62rem;
    color: var(--sub);
    margin-top: .15rem;
    font-family: var(--font-en);
  }

  /* ── Creator Tabs ── */
  .tabs-wrap {
    padding: .85rem 1.2rem;
    display: flex;
    gap: .4rem;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    background: none;
    border: 1px solid var(--border);
    color: var(--sub);
    border-radius: 4px;
    padding: .3rem .85rem;
    font-size: .72rem;
    font-weight: 500;
    font-family: var(--font-jp);
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: .02em;
    transition: background .15s, color .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab:hover { border-color: var(--blue-l); color: var(--blue-l); }
  .tab.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
    font-weight: 600;
  }

  /* ── Search ── */
  .search-wrap {
    padding: .75rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: .6rem;
  }
  .search-icon { color: var(--sub); flex-shrink: 0; }
  .search-wrap input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: .85rem;
    font-family: var(--font-jp);
    outline: none;
    -webkit-appearance: none;
  }
  .search-wrap input::placeholder { color: var(--sub2); }
  .count-bar {
    padding: .5rem 1.2rem .3rem;
    font-size: .65rem;
    color: var(--sub);
    font-family: var(--font-en);
    letter-spacing: .06em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .count-bar strong { color: var(--blue-l); }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-top: none;
  }

  /* featured */
  .card.featured { grid-column: 1 / -1; }

  .card {
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    background: var(--bg);
    -webkit-tap-highlight-color: transparent;
  }

  /* サムネ */
  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    transition: transform .4s cubic-bezier(.25,.46,.45,.94);
  }
  .card.featured .card-img { aspect-ratio: 16/7; }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sub2);
    font-size: 1.5rem;
  }
  .card.featured .card-img-placeholder { aspect-ratio: 16/7; }

  /* オーバーレイ */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: .7rem .75rem;
    gap: .25rem;
  }
  .card.featured .card-overlay { padding: 1.1rem 1.2rem; }

  /* クリエイターラベル */
  .card-creator {
    font-family: var(--font-en);
    font-size: .55rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--blue-l);
  }
  .card.featured .card-creator { font-size: .62rem; }

  /* タイトル */
  .card-title {
    font-size: .78rem;
    font-weight: 700;
    line-height: 1.4;
    color: #fff;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card.featured .card-title {
    font-size: 1.05rem;
    -webkit-line-clamp: 2;
  }

  /* 日付 */
  .card-date {
    font-family: var(--font-en);
    font-size: .58rem;
    color: rgba(255,255,255,.35);
    letter-spacing: .04em;
    margin-top: .15rem;
  }

  /* アクティブ時の青ライン */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--blue);
    transform: scaleX(0);
    transition: transform .2s;
  }
  .card:active::after { transform: scaleX(1); }

  /* ── Empty ── */
  .empty {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--sub);
  }
  .empty-label {
    font-family: var(--font-en);
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: .75rem;
  }
  .empty-text { font-size: .85rem; }

  /* ── Safe area ── */
  .safe-bottom { height: max(1.5rem, env(safe-area-inset-bottom)); }

  /* ── PC ── */
  @media (min-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    .card.featured { grid-column: 1 / -1; }
    .card.featured .card-img { aspect-ratio: 21/7; }
    .card.featured .card-img-placeholder { aspect-ratio: 21/7; }
    .hdr { padding: 1.6rem 1.6rem 1.1rem; }
    .tabs-wrap, .search-wrap, .count-bar { padding-left: 1.6rem; padding-right: 1.6rem; }
    .card-title { font-size: .82rem; }
    .card.featured .card-title { font-size: 1.2rem; }
  }
</style>
</head>

let creator = 'all';

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    creator = t.dataset.creator;
    render();
  });
});

function filtered() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  return DATA.filter(a => {
    if (creator !== 'all' && a.target_name !== creator) return false;
    if (q && !a.title.toLowerCase().includes(q) && !a.target_name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const items = filtered();
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('disp-count').textContent = items.length;
  document.getElementById('count-label').textContent = items.length;

  if (!items.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map((a, i) => {
    const featured = i === 0 ? 'featured' : '';
    const eager    = i < 4 ? 'eager' : 'lazy';
    const img = a.thumbnail_url
      ? `<img class="card-img" src="${a.thumbnail_url}" alt="" loading="${eager}">`
      : `<div class="card-img-placeholder">—</div>`;
    return `
      <a class="card ${featured}" href="${a.note_url}" target="_blank" rel="noopener">
        ${img}
        <div class="card-overlay">
          <span class="card-creator">${a.target_name}</span>
          <p class="card-title">${a.title}</p>
          <span class="card-date">${a.published_at}</span>
        </div>
      </a>`;
  }).join('');
}

render();
</script>
